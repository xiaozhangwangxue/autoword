name: Build release applications

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
            archive: zip
          - os: windows-latest
            name: windows
            archive: zip
          - os: ubuntu-latest
            name: linux
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements-build.txt
      - name: Package macOS application
        if: matrix.name == 'macos'
        run: pyinstaller --noconfirm --clean --windowed --onedir --name AutoWord --icon assets/icons/AutoWord.icns desktop.py
      - name: Package Windows application
        if: matrix.name == 'windows'
        run: pyinstaller --noconfirm --clean --windowed --onedir --name AutoWord --icon assets/icons/AutoWord.ico desktop.py
      - name: Package Linux application
        if: matrix.name == 'linux'
        run: pyinstaller --noconfirm --clean --windowed --onedir --name AutoWord desktop.py
      - name: Archive application (Unix)
        if: runner.os != 'Windows'
        run: cd dist && tar -czf ../AutoWord-${{ matrix.name }}.tar.gz AutoWord*
      - name: Archive application (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/AutoWord -DestinationPath AutoWord-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: AutoWord-${{ matrix.name }}
          path: AutoWord-${{ matrix.name }}.*

  android:
    name: android-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Restore stable Android signing key
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore
      - name: Build offline APK
        run: gradle -p android :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - run: cp android/app/build/outputs/apk/release/app-release.apk AutoWord-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: AutoWord-android
          path: AutoWord-android.apk

  release:
    name: publish-release
    needs: [desktop, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
