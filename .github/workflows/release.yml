name: Build release applications

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
            archive: zip
          - os: windows-latest
            name: windows
            archive: zip
          - os: ubuntu-latest
            name: linux
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements-build.txt
      - name: Package macOS application
        if: matrix.name == 'macos'
        run: pyinstaller --noconfirm --clean --windowed --onedir --collect-data docx --add-data packaging/docx-parts-placeholder:docx/parts --name AutoWord --icon assets/icons/AutoWord.icns desktop.py
      - name: Ad-hoc sign macOS application
        if: matrix.name == 'macos'
        run: codesign --force --deep --sign - dist/AutoWord.app
      - name: Create drag-to-install macOS DMG
        if: matrix.name == 'macos'
        run: |
          mkdir -p dmg-root
          cp -R dist/AutoWord.app dmg-root/AutoWord.app
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname AutoWord -srcfolder dmg-root -ov -format UDZO AutoWord-macos.dmg
      - name: Package Windows application
        if: matrix.name == 'windows'
        run: pyinstaller --noconfirm --clean --windowed --onedir --collect-data docx --add-data packaging/docx-parts-placeholder:docx/parts --name AutoWord --icon assets/icons/AutoWord.ico desktop.py
      - name: Package Linux application
        if: matrix.name == 'linux'
        run: pyinstaller --noconfirm --clean --windowed --onedir --collect-data docx --add-data packaging/docx-parts-placeholder:docx/parts --name AutoWord desktop.py
      - name: Archive application (Unix)
        if: runner.os != 'Windows'
        run: cd dist && tar -czf ../AutoWord-${{ matrix.name }}.tar.gz AutoWord*
      - name: Archive application (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/AutoWord -DestinationPath AutoWord-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: AutoWord-${{ matrix.name }}
          path: AutoWord-${{ matrix.name }}.*

  android:
    name: android-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Restore stable Android signing key
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/release.keystore
      - name: Build offline APK
        run: gradle -p android :app:assembleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      - run: cp android/app/build/outputs/apk/release/app-release.apk AutoWord-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: AutoWord-android
          path: AutoWord-android.apk

  release:
    name: publish-release
    needs: [desktop, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body: |
            ## 中文更新说明
            - 桌面端可自行选择导出位置，默认保存到系统“下载”文件夹。
            - 转换完成后显示成品文件列表，并可直接打开导出文件夹。
            - macOS 界面升级为液态玻璃风格，保留拖拽安装 DMG。
            - 官网下载前会按 Android、macOS、Windows 和 Linux 显示对应安装提示。

            ## English release notes
            - Desktop builds now let users choose an export location and default to the system Downloads folder.
            - Completed files are listed in-app, with a button to reveal the export folder.
            - The macOS interface now uses a liquid-glass visual treatment while retaining the drag-to-install DMG.
            - The official website shows platform-specific installation guidance before each download.
