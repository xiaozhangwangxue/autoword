name: Build release applications

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
            archive: zip
          - os: windows-latest
            name: windows
            archive: zip
          - os: ubuntu-latest
            name: linux
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install -r requirements-build.txt
      - name: Package application
        run: pyinstaller --noconfirm --clean --onefile --name AutoWord desktop.py
      - name: Archive application (Unix)
        if: runner.os != 'Windows'
        run: tar -C dist -czf AutoWord-${{ matrix.name }}.tar.gz AutoWord
      - name: Archive application (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/AutoWord.exe -DestinationPath AutoWord-windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: AutoWord-${{ matrix.name }}
          path: AutoWord-${{ matrix.name }}.*
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: AutoWord-${{ matrix.name }}.*

  android:
    name: android-apk
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'
      - name: Build offline APK
        run: gradle -p android :app:assembleDebug
      - run: cp android/app/build/outputs/apk/debug/app-debug.apk AutoWord-android.apk
      - uses: actions/upload-artifact@v4
        with:
          name: AutoWord-android
          path: AutoWord-android.apk
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: AutoWord-android.apk
